# Redirección de HTTP (80) a HTTPS (443)
server {
    listen 80;
    server_name localhost;
    return 301 https://$host$request_uri;
}

# Bloque para HTTPS en el puerto 443
server {
    listen 443 ssl;
    server_name localhost;

    # Rutas donde Nginx buscará los certificados DENTRO del contenedor
    ssl_certificate /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;

    # Optimización opcional de SSL
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location /socket.io/ {
        proxy_pass https://users:3000;
        proxy_http_version 1.1;
        proxy_ssl_verify off;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ~ ^/(login|logout|createuser|difficulties|move|history|reset|surrender|friends|users)(/|$) {
        proxy_pass https://users:3000;
        proxy_ssl_verify off;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # En MPA, cada .html debe existir físicamente. Si no existe, devolver 404.
    location ~* \.html$ {
        root /usr/share/nginx/html;
        try_files $uri =404;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
